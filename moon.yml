language: 'go'
layer: 'application'
stack: 'backend'

project:
  title: 'go-cip-30'
  description: 'Go library for implementing CIP-30 in web2 backends.'
  owner: 'meigma'
  maintainers:
    - 'meigma'

toolchains:
  default: 'go'

fileGroups:
  goSources:
    - '**/*.go'
    - 'go.mod'
    - 'go.sum'
  lintConfig:
    - '.golangci.yml'
    - '.prototools'
    - '.moon/proto/golangci-lint.toml'
  releaseConfig:
    - 'release-please-config.json'
    - '.release-please-manifest.json'

workspace:
  inheritedTasks:
    include: []

tasks:
  format:
    command: 'proto run golangci-lint -- fmt --config .golangci.yml --diff'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
    options:
      cache: false

  lint:
    command: 'proto run golangci-lint -- run --config .golangci.yml ./... --show-stats=false'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
    options:
      cache: false

  build:
    command: 'go build ./...'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'

  test:
    command: 'go test ./...'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
    options:
      cache: false

  check:
    deps:
      - 'root:format'
      - 'root:lint'
      - 'root:build'
      - 'root:test'
      - 'docs:build'
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
      - '@group(releaseConfig)'
    options:
      cache: false
      runInCI: true

  # One-time local setup: clone the CIP-30 reference implementation into the
  # gitignored ref/ folder. Idempotent; skipped if already present. Refresh by
  # deleting ref/cardano-verify-datasignature and re-running.
  setup-ref:
    script: 'test -d ref/cardano-verify-datasignature || git clone --depth 1 https://github.com/cardano-foundation/cardano-verify-datasignature ref/cardano-verify-datasignature'
    toolchains: ['system']
    inputs: []
    options:
      cache: false
      runInCI: false
